<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1026"/>
      <stop offset="100%" stop-color="#141a3a"/>
    </linearGradient>
    <linearGradient id="coord" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="spec" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="tool" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="mcp" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="1000" height="720" fill="url(#bg)"/>

  <!-- Stars -->
  <g fill="#e2e8f0" opacity="0.7">
    <circle cx="60" cy="80" r="1.2"/><circle cx="180" cy="50" r="1"/><circle cx="320" cy="90" r="1.4"/>
    <circle cx="520" cy="40" r="1"/><circle cx="700" cy="70" r="1.3"/><circle cx="860" cy="100" r="1"/>
    <circle cx="940" cy="60" r="1.5"/><circle cx="40" cy="180" r="1"/><circle cx="960" cy="200" r="1.2"/>
  </g>
  <!-- Tiny satellite -->
  <g transform="translate(880,140)">
    <rect x="-10" y="-3" width="20" height="6" rx="2" fill="#cbd5e1"/>
    <rect x="-22" y="-1.5" width="10" height="3" fill="#64748b"/>
    <rect x="12" y="-1.5" width="10" height="3" fill="#64748b"/>
  </g>

  <text x="500" y="46" text-anchor="middle" fill="#f8fafc" font-size="26" font-weight="700">Skywatcher — Multi-Agent Satellite Tracker</text>
  <text x="500" y="72" text-anchor="middle" fill="#94a3b8" font-size="14">Built with Google ADK + MCP + Gemini · CelesTrak + Skyfield</text>

  <!-- User -->
  <g>
    <rect x="40" y="320" width="150" height="80" rx="12" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
    <text x="115" y="355" text-anchor="middle" fill="#f1f5f9" font-size="16" font-weight="600">User</text>
    <text x="115" y="378" text-anchor="middle" fill="#94a3b8" font-size="11">"When can I see the</text>
    <text x="115" y="392" text-anchor="middle" fill="#94a3b8" font-size="11">ISS tonight?"</text>
  </g>

  <!-- CLI -->
  <g>
    <rect x="230" y="320" width="150" height="80" rx="12" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
    <text x="305" y="352" text-anchor="middle" fill="#f1f5f9" font-size="15" font-weight="600">Agents CLI</text>
    <text x="305" y="375" text-anchor="middle" fill="#94a3b8" font-size="11">skywatcher ask ...</text>
    <text x="305" y="390" text-anchor="middle" fill="#94a3b8" font-size="11">skywatcher passes ...</text>
  </g>

  <!-- Coordinator -->
  <g>
    <rect x="430" y="300" width="220" height="120" rx="14" fill="url(#coord)" opacity="0.95"/>
    <text x="540" y="338" text-anchor="middle" fill="#fff" font-size="17" font-weight="700">Coordinator Agent</text>
    <text x="540" y="360" text-anchor="middle" fill="#f1f5f9" font-size="12">(root · Google ADK)</text>
    <text x="540" y="382" text-anchor="middle" fill="#e9d5ff" font-size="11">Routes request →</text>
    <text x="540" y="398" text-anchor="middle" fill="#e9d5ff" font-size="11">right specialist</text>
  </g>

  <!-- Sub-agents -->
  <g>
    <rect x="700" y="120" width="250" height="90" rx="12" fill="url(#spec)" opacity="0.95"/>
    <text x="825" y="152" text-anchor="middle" fill="#04263a" font-size="15" font-weight="700">Satellite Data Agent</text>
    <text x="825" y="174" text-anchor="middle" fill="#06384a" font-size="11">find / list satellites</text>
    <text x="825" y="192" text-anchor="middle" fill="#06384a" font-size="11">3 function tools</text>
  </g>
  <g>
    <rect x="700" y="320" width="250" height="90" rx="12" fill="url(#spec)" opacity="0.95"/>
    <text x="825" y="352" text-anchor="middle" fill="#04263a" font-size="15" font-weight="700">Sky Math Agent</text>
    <text x="825" y="374" text-anchor="middle" fill="#06384a" font-size="11">predict passes · overhead</text>
    <text x="825" y="392" text-anchor="middle" fill="#06384a" font-size="11">2 function tools</text>
  </g>
  <g>
    <rect x="700" y="520" width="250" height="90" rx="12" fill="url(#spec)" opacity="0.95"/>
    <text x="825" y="552" text-anchor="middle" fill="#04263a" font-size="15" font-weight="700">Educator Agent</text>
    <text x="825" y="574" text-anchor="middle" fill="#06384a" font-size="11">general space Q&amp;A</text>
    <text x="825" y="592" text-anchor="middle" fill="#06384a" font-size="11">no tools · LLM knowledge</text>
  </g>

  <!-- Arrows: user -> cli -> coord -->
  <path d="M190,360 L230,360" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M380,360 L430,360" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Arrows: coord -> sub-agents -->
  <path d="M650,330 Q680,330 700,180" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M650,360 L700,360" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M650,390 Q680,390 700,560" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Tool layer -->
  <g>
    <rect x="120" y="500" width="280" height="70" rx="10" fill="url(#tool)" opacity="0.92"/>
    <text x="260" y="528" text-anchor="middle" fill="#063b2e" font-size="14" font-weight="700">Tool Layer (deterministic)</text>
    <text x="260" y="548" text-anchor="middle" fill="#0a4f3c" font-size="11">CelesTrak fetch · Skyfield SGP4 math</text>
    <text x="260" y="562" text-anchor="middle" fill="#0a4f3c" font-size="11">security: sanitize + rate-limit</text>
  </g>

  <!-- MCP server -->
  <g>
    <rect x="430" y="500" width="220" height="70" rx="10" fill="url(#mcp)" opacity="0.92"/>
    <text x="540" y="528" text-anchor="middle" fill="#3a2606" font-size="14" font-weight="700">MCP Server</text>
    <text x="540" y="548" text-anchor="middle" fill="#4a3008" font-size="11">exposes tools over MCP</text>
    <text x="540" y="562" text-anchor="middle" fill="#4a3008" font-size="11">any client can call</text>
  </g>

  <!-- External data -->
  <g>
    <rect x="700" y="650" width="250" height="50" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
    <text x="825" y="672" text-anchor="middle" fill="#cbd5e1" font-size="13" font-weight="600">CelesTrak (free, no API key)</text>
    <text x="825" y="690" text-anchor="middle" fill="#64748b" font-size="11">TLE orbital elements · NORAD catalog</text>
  </g>

  <!-- Arrows: tools -> celestrak, mcp -> tools -->
  <path d="M260,500 L260,440" stroke="#64748b" stroke-width="1.6" marker-end="url(#arrow)"/>
  <path d="M540,500 L540,420" stroke="#64748b" stroke-width="1.6" marker-end="url(#arrow)"/>
  <path d="M400,535 L430,535" stroke="#64748b" stroke-width="1.6" marker-end="url(#arrow)"/>
  <path d="M400,660 Q650,660 825,650" stroke="#64748b" stroke-width="1.6" fill="none" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <g transform="translate(40,640)">
    <rect x="0" y="0" width="14" height="14" rx="3" fill="url(#coord)"/>
    <text x="22" y="12" fill="#cbd5e1" font-size="11">Coordinator</text>
    <rect x="110" y="0" width="14" height="14" rx="3" fill="url(#spec)"/>
    <text x="132" y="12" fill="#cbd5e1" font-size="11">Specialist agents</text>
    <rect x="250" y="0" width="14" height="14" rx="3" fill="url(#tool)"/>
    <text x="272" y="12" fill="#cbd5e1" font-size="11">Deterministic tools</text>
    <rect x="390" y="0" width="14" height="14" rx="3" fill="url(#mcp)"/>
    <text x="412" y="12" fill="#cbd5e1" font-size="11">MCP server</text>
  </g>
</svg>
